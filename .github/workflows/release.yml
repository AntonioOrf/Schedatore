name: Build and Release

on:
  push:
    tags:
      - 'v*' # Si attiva solo al push di un tag che inizia per v (es. v1.0.8)

permissions:
  contents: write # Permesso necessario per caricare file nella sezione Releases

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa le dipendenze
        run: npm ci

      - name: Costruisci e pubblica la Release
        run: npm run publish-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
