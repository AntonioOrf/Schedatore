<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivium Manuscriptorum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen p-4 md:p-6 flex flex-col h-screen overflow-hidden">

    <!-- Modal Immagini -->
    <div id="image-modal" class="fixed inset-0 bg-black/90 z-50 hidden-tab flex justify-center items-center p-4 backdrop-blur-sm">
        <button onclick="chiudiModal()" class="absolute top-6 right-6 text-stone-300 hover:text-white bg-black/50 p-2 rounded-full">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <img id="modal-img" class="max-w-full max-h-[90vh] rounded-md object-contain border border-stone-700">
    </div>

    <!-- Header Fisso In Alto -->
    <header class="shrink-0 mb-6 flex flex-col md:flex-row items-center justify-between border-b-2 border-amber-700/20 pb-4">
        <div>
            <h1 class="text-3xl font-bold text-amber-900 flex items-center justify-center md:justify-start gap-3">
                <i data-lucide="book-open" class="w-8 h-8 text-amber-700"></i>
                Archivium Manuscriptorum
            </h1>
            <p class="text-stone-500 mt-1 italic text-sm">Organizzazione ad albero & Allegati</p>
        </div>
        
        <nav class="flex gap-2 mt-4 md:mt-0 bg-stone-200 p-1 rounded-lg shadow-inner">
            <button id="btn-tab-list" onclick="switchTab('list')" class="flex items-center gap-2 px-4 py-2 rounded-md transition-all bg-amber-700 text-white shadow-md">
                <i data-lucide="library" class="w-4 h-4"></i>
                <span class="hidden md:inline">Archivio</span>
            </button>
            <button id="btn-tab-add" onclick="switchTab('add')" class="flex items-center gap-2 px-4 py-2 rounded-md transition-all hover:bg-stone-300">
                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                <span id="testo-btn-add" class="hidden md:inline">Nuova Scheda</span>
            </button>
        </nav>
    </header>

    <!-- Layout a due colonne -->
    <div class="flex-1 flex flex-col md:flex-row gap-6 overflow-hidden">
        
        <!-- SIDEBAR: Albero Cartelle -->
        <aside class="w-full md:w-72 shrink-0 bg-white/90 backdrop-blur-md shadow-xl border border-stone-200/50 rounded-xl flex flex-col h-full overflow-hidden">
            <div class="p-4 border-b border-stone-200 bg-stone-50 flex justify-between items-center">
                <h2 class="font-bold text-stone-700 flex items-center gap-2">
                    <i data-lucide="folder-tree" class="w-5 h-5 text-amber-700"></i> Struttura
                </h2>
                <button onclick="aggiungiCartella()" class="text-amber-700 hover:text-amber-900 bg-amber-100 hover:bg-amber-200 p-1.5 rounded transition-colors" title="Crea nuova cartella">
                    <i data-lucide="folder-plus" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div id="folder-list" class="flex-1 p-3 overflow-y-auto custom-scroll space-y-1">
                <!-- Le cartelle verranno generate qui dal JS -->
            </div>
        </aside>

        <!-- MAIN AREA: Contenuto Principale -->
        <main class="flex-1 bg-white/90 backdrop-blur-md shadow-xl border border-stone-200/50 rounded-xl p-6 h-full overflow-y-auto custom-scroll">
            
            <!-- VISTA: LISTA MANOSCRITTI -->
            <div id="view-list" class="fade-in h-full flex flex-col">
                
                <div class="flex flex-col md:flex-row justify-between items-end gap-4 border-b border-stone-200 pb-4 mb-4 shrink-0">
                    <div>
                        <h2 class="text-2xl font-bold text-amber-800 flex items-center gap-2">
                            <i data-lucide="folder-open" class="w-6 h-6"></i>
                            <span id="titolo-cartella-attuale">Generale</span>
                        </h2>
                        <span id="counter-results" class="text-sm text-stone-500 font-medium mt-1 block">Caricamento...</span>
                    </div>
                    
                    <div class="w-full max-w-sm relative">
                        <i data-lucide="search" class="absolute left-3 top-2.5 text-stone-400 w-4 h-4"></i>
                        <input type="text" id="search-input" placeholder="Cerca in questa cartella..." class="w-full pl-9 pr-3 py-2 text-sm border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 bg-stone-50">
                    </div>
                </div>
                
                <!-- Griglia -->
                <div id="manoscritti-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-5 pb-10"></div>

                <!-- Stato Vuoto -->
                <div id="empty-state" class="hidden text-center py-16 mt-10 bg-stone-50 rounded-lg border border-dashed border-stone-300">
                    <i data-lucide="file-box" class="w-12 h-12 text-stone-300 mx-auto mb-3"></i>
                    <p class="text-stone-500 italic text-lg mb-4">La cartella è vuota.</p>
                    <button onclick="eliminaCartellaAttuale()" id="btn-delete-folder" class="hidden items-center gap-2 text-red-600 hover:text-red-800 mx-auto text-sm font-medium">
                        <i data-lucide="trash" class="w-4 h-4"></i> Elimina questa cartella
                    </button>
                </div>
            </div>

            <!-- VISTA: FORM COMPILAZIONE -->
            <div id="view-add" class="hidden-tab fade-in max-w-2xl mx-auto pb-10">
                <div class="flex justify-between items-center border-b border-stone-200 pb-2 mb-6">
                    <h2 id="form-title" class="text-2xl font-semibold text-amber-800">Compila Nuova Scheda</h2>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden text-sm text-stone-500 hover:text-amber-700 underline">Annulla modifica</button>
                </div>
                
                <form id="manoscritto-form" class="space-y-5 bg-stone-50 p-6 rounded-xl border border-stone-200 shadow-inner">
                    <input type="hidden" id="form-id">
                    <input type="hidden" id="form-allegato-nome"> 
                    <input type="hidden" id="form-allegato-tipo"> 
                    
                    <!-- Selezione Cartella -->
                    <div class="bg-amber-100/50 p-3 rounded-lg border border-amber-200 mb-4">
                        <label class="text-sm font-bold text-amber-900 flex items-center gap-1 mb-1">
                            <i data-lucide="folder" class="w-4 h-4"></i> Salva nella cartella:
                        </label>
                        <select id="form-cartella" class="w-full p-2 border border-amber-300 rounded-md bg-white text-stone-800 font-medium focus:ring-2 focus:ring-amber-500">
                            <!-- Popolato da JS -->
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-stone-700 flex items-center gap-1"><i data-lucide="file-text" class="w-3.5 h-3.5 text-amber-700"></i> Segnatura *</label>
                            <input required id="form-segnatura" placeholder="es. Plut. 40.1" class="w-full p-2 border border-stone-300 rounded-md bg-white">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-stone-700 flex items-center gap-1"><i data-lucide="user" class="w-3.5 h-3.5 text-amber-700"></i> Autore</label>
                            <input id="form-autore" placeholder="es. Anonimo" class="w-full p-2 border border-stone-300 rounded-md bg-white">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-stone-700 flex items-center gap-1"><i data-lucide="book" class="w-3.5 h-3.5 text-amber-700"></i> Titolo / Contenuto</label>
                        <input id="form-titolo" placeholder="Titolo dell'opera" class="w-full p-2 border border-stone-300 rounded-md bg-white">
                    </div>

                    <!-- Allegati -->
                    <div class="space-y-1 border-t border-b border-stone-200 py-4 my-2 bg-stone-100/50 px-3 rounded-lg">
                        <label class="text-sm font-semibold text-stone-800 flex items-center gap-2"><i data-lucide="paperclip" class="w-4 h-4 text-amber-700"></i> Allega Documento (Foto o PDF)</label>
                        <input type="file" id="form-allegato" accept="image/*,.pdf" class="w-full p-2 border border-stone-300 rounded-md bg-white file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 cursor-pointer">
                        
                        <img id="preview-immagine" class="mt-3 max-h-48 hidden rounded-md shadow-sm border border-stone-300 object-cover">
                        <div id="preview-pdf" class="mt-3 p-2 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-red-800 hidden">
                            <i data-lucide="file-text" class="w-6 h-6 shrink-0"></i>
                            <div>
                                <p class="text-xs font-semibold">PDF pronto per l'archiviazione</p>
                                <p id="pdf-nome-file" class="text-[10px] text-stone-500 truncate max-w-[200px]"></p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-stone-700">Note Testuali / Codicologiche</label>
                        <textarea id="form-note" rows="3" class="w-full p-2 border border-stone-300 rounded-md bg-white"></textarea>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="btn-submit-form" class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-3 px-4 rounded-md flex justify-center items-center gap-2 text-lg">
                            <i data-lucide="save" class="w-5 h-5"></i> <span id="testo-btn-submit">Salva Scheda</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Script Application -->
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/actions.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
